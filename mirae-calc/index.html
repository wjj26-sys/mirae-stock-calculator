<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>미래에셋 계산기</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <div class="phone-wrap">
      <div id="screen" class="screen">
        <img class="bg" src="./assets/bg/main-bg.png" alt="background" />

        <div id="accountNoText" class="top-text account-no-text">123-4567-8910-2</div>
        <div id="accountNameText" class="top-text account-name-text">홍길동</div>

        <!-- 상단 요약 -->
        <div id="sumBuy" class="num-box sum-buy"></div>
        <div id="sumProfit" class="num-box sum-profit"></div>
        <div id="sumEval" class="num-box sum-eval"></div>
        <div id="sumRate" class="num-box sum-rate"></div>

        <!-- 카드 -->
        <div id="cardLayer" class="card-layer"></div>
      </div>
    </div>

    <div class="panel">
      <h2>입력</h2>

      <div class="field">
        <label>초기 예수금</label>
        <input id="depositInput" type="text" inputmode="numeric" />
      </div>

      <div class="field">
        <label>계좌번호</label>
        <input id="accountNoInput" type="text" inputmode="numeric" />
      </div>

      <div class="field">
        <label>이름</label>
        <input id="accountNameInput" type="text" />
      </div>

      <div class="btn-row">
        <button id="addCardBtn" type="button">카드 추가</button>
        <button id="downloadBtn" type="button">이미지 저장</button>
        <button id="resetBtn" type="button" class="danger">초기화</button>
      </div>

      <div id="depositStatus" class="deposit-status"></div>
      <div id="editorList"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="./app.js"></script>

  <svg width="0" height="0" style="position:absolute">
    <filter id="textNoiseLg" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.50 0.50" numOctaves="2" seed="2" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="monoNoise"/>
      <feComponentTransfer in="monoNoise" result="softNoise">
        <feFuncA type="table" tableValues="1 250"/>
      </feComponentTransfer>

      <!-- 글자 모양 안에만 노이즈 자르기 -->
      <feComposite in="softNoise" in2="SourceAlpha" operator="in" result="noiseInText"/>

      <!-- 가장자리 살짝 부드럽게 -->
      <feGaussianBlur in="noiseInText" stdDeviation="0.60" result="noiseSoft"/>

      <!-- 원본 텍스트에만 입자 섞기 -->
      <feBlend in="SourceGraphic" in2="noiseSoft" mode="multiply"/>
    </filter>

    <filter id="textNoiseMd" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.10 0.15" numOctaves="2" seed="2" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="monoNoise"/>
      <feComponentTransfer in="monoNoise" result="softNoise">
        <feFuncA type="table" tableValues="0 0.50"/>
      </feComponentTransfer>
      <feComposite in="softNoise" in2="SourceAlpha" operator="in" result="noiseInText"/>
      <feGaussianBlur in="noiseInText" stdDeviation="0.10" result="noiseSoft"/>
      <feBlend in="SourceGraphic" in2="noiseSoft" mode="multiply"/>
    </filter>
  </svg>

</body>
</html>
